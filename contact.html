<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Contact | Via Health</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main style="max-width:600px; margin:80px auto; text-align:center;">
    <h1>Partner with Via Health</h1>

    <p style="margin-bottom:30px; color:#666;">
      Interested in bringing a healthcare pathways talk to your school or organization?
      Fill out this form and we’ll get back to you.
    </p>

    <form>
      <input type="text" placeholder="Your name" required><br><br>
      <input type="email" placeholder="Email" required><br><br>
      <input type="text" placeholder="Organization / School"><br><br>
      <textarea placeholder="Tell us what you're looking for" rows="4"></textarea><br><br>
      <button type="submit">Submit</button>
    </form>
  </main>

</body>
</html>
